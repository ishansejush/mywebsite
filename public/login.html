<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width:380px">

<h3 class="text-center mb-4">Sign In</h3>

<input id="email" class="form-control mb-3" placeholder="Email">

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-primary w-100 mb-3">
Login
</button>

<p class="text-center">
No account? <a href="/signup.html">Sign up</a>
</p>

</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://uxkunzwpamfmkbddmavu.supabase.co",
"sb_publishable_hSRnuCeMQ4I4IlPVjuw9Aw_kkWa7IAf"
)

window.login = async function(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase.auth.signInWithPassword({
email: email,
password: password
})

if(error){
alert("Login failed: " + error.message)
return
}

const user = data.user

// check role
const { data: profile, error: roleError } = await supabase
.from("profiles")
.select("role")
.eq("id", user.id)
.single()

if(roleError){
alert("Role check failed")
return
}

if(profile.role === "moderator"){
window.location = "/dashboards/moderator.html"
}
else{
window.location = "/dashboards/user.html"
}

}

</script>

</body>
</html>
