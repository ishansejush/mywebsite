<!DOCTYPE html>
<html>

<head>

<title>Valinorco Homepage Editor</title>

<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/mod.css">

<style>

/* editor control panel */

.editor-toolbar{
position:fixed;
top:70px;
left:20px;
z-index:2000;
}

.editor-toolbar button{
background:#6a00ff;
color:white;
border:none;
padding:8px 14px;
cursor:pointer;
border-radius:6px;
}

/* block controls */

.block-controls{
margin-top:10px;
display:flex;
gap:10px;
}

.block-controls button{
background:#222;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
border-radius:5px;
}

.block-controls button:hover{
background:#444;
}

</style>

</head>

<body>

<!-- Topbar -->

<div class="topbar">

<h2>Valinorco Editor</h2>

</div>

<!-- Editor toolbar -->

<div class="editor-toolbar">

<button onclick="addBlock()">Add Section</button>

</div>

<!-- Dynamic homepage -->

<div id="page"></div>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script type="module">

import { renderPage } from "/js/renderPage.js"
import { addBlock } from "/js/blockEditor.js"
import { requireModerator } from "/js/auth.js"

requireModerator()

window.addBlock = addBlock

const container = document.getElementById("page")

renderPage(container, true)

</script>

</body>

</html>
