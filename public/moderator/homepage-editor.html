<!DOCTYPE html>
<html>

<head>
<title>Homepage Editor</title>
<link rel="stylesheet" href="/css/mod.css">

<style>

/* edit button */

.edit-btn{
position:absolute;
top:5px;
right:5px;
background:#6a00ff;
color:white;
border:none;
padding:5px 8px;
cursor:pointer;
font-size:12px;
border-radius:4px;
}

/* make editable elements relative */

.editable{
position:relative;
border:1px dashed transparent;
}

.editable:hover{
border-color:#6a00ff;
}

</style>

</head>

<body>

<div class="main">

<section class="hero">

<div class="editable">

<button class="edit-btn" onclick="editField('title')">Edit</button>

<h1 id="homeTitle"></h1>

</div>

<div class="editable">

<button class="edit-btn" onclick="editField('subtitle')">Edit</button>

<p id="homeSubtitle"></p>

</div>

</section>

</div>

<script type="module" src="/js/homepage-editor.js"></script>

</body>
</html>
