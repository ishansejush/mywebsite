<!DOCTYPE html>
<html>

<head>
<title>Homepage Editor</title>

<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/mod.css">

<style>

/* editable container */

.editable{
position:relative;
display:inline-block;
}

/* edit icon */

.edit-btn{
position:absolute;
top:-18px;
right:-25px;
background:#6a00ff;
color:white;
border:none;
font-size:12px;
padding:4px 7px;
cursor:pointer;
border-radius:4px;
opacity:0;
}

/* show button on hover */

.editable:hover .edit-btn{
opacity:1;
}

</style>

</head>

<body>

<!-- Topbar -->

<div class="topbar">

<h2>Valinorco Editor</h2>

</div>


<!-- Hero section -->

<div class="section hero">

<div class="editable">

<button class="edit-btn" onclick="editField('title')">✎</button>

<h1 id="homeTitle"></h1>

</div>

<div class="editable">

<button class="edit-btn" onclick="editField('subtitle')">✎</button>

<p id="homeSubtitle"></p>

</div>

<button class="scroll-btn">Explore</button>

</div>


<!-- Features section -->

<div class="section">

<h1>Features</h1>

<p>User accounts, moderation tools, and secure authentication.</p>

</div>


<!-- Community section -->

<div class="section">

<h1>Community</h1>

<p>Connect with others and share ideas.</p>

</div>

<script type="module" src="/js/homepage-editor.js"></script>

</body>
</html>
