<!DOCTYPE html>
<html>
<head>

<title>Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width:380px">

<h3 class="text-center mb-4">Create Account</h3>

<input id="email" class="form-control mb-3" placeholder="Email">

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="signup()" class="btn btn-success w-100">
Sign Up
</button>

</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://uxkunzwpamfmkbddmavu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4a3VuendwYW1mbWtiZGRtYXZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTY4MjEsImV4cCI6MjA4ODg5MjgyMX0.kSWyPX9KW8f_3pEIRWzm5y09k07zkvg5ZHeyWKG4ajA"
)

window.signup = async function(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { error } = await supabase.auth.signUp({
email,
password
})

if(error){
alert("Signup failed")
}
else{
alert("Account created!")
window.location="/public/login.html"
}

}

</script>

</body>
</html>
