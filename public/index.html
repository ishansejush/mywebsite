<!DOCTYPE html>
<html>

<head>
<title>My Platform</title>

<style>

/* Global styles */

body{
margin:0;
font-family:Arial, sans-serif;
background:black;
color:white;
scroll-behavior:smooth;
}

/* Top bar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:black;
position:fixed;
width:100%;
top:0;
left:0;
z-index:1000;
border-bottom:1px solid #222;
box-sizing:border-box;
}

.menu-icon{
font-size:28px;
cursor:pointer;
}

/* Sidebar */

.sidebar{
position:fixed;
top:0;
right:-260px;
width:260px;
height:100%;
background:#111;
transition:0.3s;
padding-top:60px;
}

.sidebar a{
display:block;
padding:16px 25px;
text-decoration:none;
color:white;
font-size:18px;
}

.sidebar a:hover{
background:#222;
}

.close-btn{
position:absolute;
top:10px;
right:20px;
font-size:28px;
cursor:pointer;
}

/* Sections */

.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

/* Hero section */

.hero{
font-size:22px;
}

/* Scroll button */

.scroll-btn{
margin-top:30px;
padding:12px 24px;
background:white;
color:black;
border:none;
cursor:pointer;
font-size:16px;
}

.scroll-btn:hover{
background:#ddd;
}

</style>

</head>

<body>

<!-- Topbar -->

<div class="topbar">

<h2>My Platform</h2>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

</div>

<!-- Sidebar -->

<div id="sidebar" class="sidebar">

<div class="close-btn" onclick="toggleMenu()">×</div>

<a href="/login.html">Sign In</a>
<a href="/signup.html">Sign Up</a>

</div>


<!-- Hero section -->

<div class="section hero">

<h1>Welcome to My Platform</h1>

<p>A moderated community platform</p>

<button class="scroll-btn" onclick="scrollDown()">Explore</button>

</div>


<!-- Second section -->

<div class="section">

<h1>Features</h1>

<p>User accounts, moderation tools, and secure authentication.</p>

</div>


<!-- Third section -->

<div class="section">

<h1>Community</h1>

<p>Connect with others and share ideas.</p>

</div>

<script>

let menuOpen = false;

function toggleMenu(){

const sidebar = document.getElementById("sidebar");

if(menuOpen){
sidebar.style.right = "-260px";
menuOpen = false;
}
else{
sidebar.style.right = "0";
menuOpen = true;
}

}

</script>


</body>
</html>
