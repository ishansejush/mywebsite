<!DOCTYPE html>
<html>

<head>
<title>Valinorco</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- Topbar -->

<div class="topbar">

<h2>Valinorco</h2>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

</div>

<!-- Sidebar -->

<div id="sidebar" class="sidebar">

<div class="close-btn" onclick="toggleMenu()">×</div>

<a class="menu-btn signin" href="/login.html">Sign In</a>

<a class="menu-btn signup" href="/signup.html">Sign Up</a>

</div>


<!-- Dynamic homepage content -->

<div id="page"></div>


<script>

let menuOpen = false;

function toggleMenu(){

const sidebar = document.getElementById("sidebar");

if(menuOpen){
sidebar.style.right = "-260px";
menuOpen = false;
}
else{
sidebar.style.right = "0";
menuOpen = true;
}

}

</script>


<script>

function scrollDown(){

const nextSection = document.querySelector(".section:nth-child(2)");

if(nextSection){
nextSection.scrollIntoView({
behavior:"smooth"
});
}

}

</script>


<script type="module">

import { renderPage } from "/js/renderPage.js"

const container = document.getElementById("page")

renderPage(container,false)

</script>

</body>
</html>
