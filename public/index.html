<!DOCTYPE html>
<html>

<head>
<title>Valinorco</title>
<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<!-- Topbar -->

<div class="topbar">

<h2>Valinorco</h2>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

</div>

<!-- Sidebar -->

<div id="sidebar" class="sidebar">

<div class="close-btn" onclick="toggleMenu()">×</div>

<a class="menu-btn signin" href="/login.html">Sign In</a>

<a class="menu-btn signup" href="/signup.html">Sign Up</a>

</div>




<!-- Hero section -->

<div class="section hero">


<h1 id="homeTitle"></h1>
<p id="homeSubtitle"></p>

<button class="scroll-btn" onclick="scrollDown()">Explore</button>

</div>


<!-- Second section -->

<div id="features" class="section">

<h1>Features</h1>

<p>User accounts, moderation tools, and secure authentication.</p>

</div>


<!-- Third section -->

<div class="section">

<h1>Community</h1>

<p>Connect with others and share ideas.</p>

</div>

<script>
let menuOpen = false;

function toggleMenu(){

const sidebar = document.getElementById("sidebar");

if(menuOpen){
sidebar.style.right = "-260px";
menuOpen = false;
}
else{
sidebar.style.right = "0";
menuOpen = true;
}

}

</script>

<script>

function scrollDown(){
document.getElementById("features").scrollIntoView({
behavior: "smooth"
});
}
</script>

<script type="module">

import { supabase } from "/js/supabase.js"

async function loadHomepage(){

const { data, error } = await supabase
.from("homepage_content")
.select("*")
.eq("id",1)
.single()

if(error){
console.error(error)
return
}

document.getElementById("homeTitle").innerText = data.title
document.getElementById("homeSubtitle").innerText = data.subtitle

}

loadHomepage()

</script>
</body>
</html>
