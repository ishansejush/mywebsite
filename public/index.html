<!DOCTYPE html>
<html>

<head>
<title>My Platform</title>

<style>

body{
margin:0;
font-family:Arial;
}

/* Top bar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#222;
color:white;
}

/* Hamburger icon */

.menu-icon{
font-size:28px;
cursor:pointer;
}

/* Side panel */

.sidebar{
position:fixed;
top:0;
right:-260px;
width:260px;
height:100%;
background:#333;
color:white;
transition:0.3s;
padding-top:60px;
}

/* Buttons inside panel */

.sidebar a{
display:block;
padding:15px 25px;
text-decoration:none;
color:white;
font-size:18px;
}

.sidebar a:hover{
background:#444;
}

/* close button */

.close-btn{
position:absolute;
top:10px;
right:20px;
font-size:28px;
cursor:pointer;
}

/* main content */

.hero{
text-align:center;
margin-top:120px;
}

</style>

</head>

<body>

<!-- Top navigation bar -->

<div class="topbar">

<h2>My Platform</h2>

<div class="menu-icon" onclick="openMenu()">☰</div>

</div>


<!-- Side panel -->

<div id="sidebar" class="sidebar">

<div class="close-btn" onclick="closeMenu()">×</div>

<a href="/login.html">Login</a>

<a href="/signup.html">Sign Up</a>

</div>


<!-- Main page content -->

<div class="hero">

<h1>Welcome to My Platform</h1>

<p>A moderated community platform</p>

</div>


<script>

function openMenu(){
document.getElementById("sidebar").style.right = "0"
}

function closeMenu(){
document.getElementById("sidebar").style.right = "-260px"
}

</script>

</body>
</html>
